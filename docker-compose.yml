version: '3'
services:
  app:
    build: .
    environment:
      - SUPABASE_URL
      - SUPABASE_KEY
      - SUPABASE_SECRET
      - RESEND_API_KEY
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  db:
    image: postgres
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: